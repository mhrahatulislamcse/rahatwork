<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
        margin: 0;
        font-family: Arial, sans-serif;
        }
        header, footer {
        background-color: red;
        text-align: center;
        padding: 10px;
        }
        nav {
        background-color: blue;
        padding: 10px;
        text-align: center;
        }
        section {
        background-color: white;
        padding: 10px;
        }
        aside {
        background-color: yellow;
        padding: 10px;
        }
        article {
        background-color: lightgreen;
        padding: 10px;
        }
        .container {
        display: flex;
        flex-direction: column;
        }
        .row {
        display: flex;
        }
    </style>
</head>
<body>
    <header>
        <h1>Header</h1>
    </header>
    <nav>
        <p>Navigation</p>
    </nav>
    <div class="container">
        <div class="row">
            <aside style="flex: 1;">
                <p>Aside</p>
            </aside>
            <section style="flex: 2;">
                <article>
                    <h2>Article</h2>
                    <p>This is the main content area.</p>
                </article>
            </section>
        </div>
    </div>
    <footer>
        <p>Footer</p>
    </footer>
    
</body>
</html>
